server:
  port: 8080
  servlet:
    context-path: /api          # 全局接口前缀

spring:
  application:
    name: user-center
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: guest
    password: guest
  data:
    redis:
      host: localhost
      port: 6379
  cache:
    type: redis
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/user_center?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8
    username: uc_app
    password: uc_pass_2026

# MyBatis-Plus:逻辑删除配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false   # 我们的字段本就是驼峰,关闭下划线转换
  global-config:
    db-config:
      logic-delete-field: isDelete         # 逻辑删除字段
      logic-delete-value: 1                # 已删
      logic-not-delete-value: 0            # 未删

# Swagger / OpenAPI(访问 /api/swagger-ui.html)
springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /v3/api-docs

# JWT 配置(密钥仅本地开发用,生产走环境变量)
jwt:
  secret: dev-only-secret-please-change-in-production-0123456789abcdef
  expire-seconds: 86400
