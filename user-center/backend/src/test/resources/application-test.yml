spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3307/user_center?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai&characterEncoding=UTF-8}
    username: ${TEST_DB_USERNAME:test}
    password: ${TEST_DB_PASSWORD:test}
  cache:
    type: none
  data:
    redis:
      host: localhost
      port: 6380
  rabbitmq:
    listener:
      simple:
        auto-startup: false
