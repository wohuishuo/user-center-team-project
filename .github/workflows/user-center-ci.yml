# 用户中心 CI:push 改动 user-center/ 时,验证前后端能否构建。
# 不部署(无服务器),只做"提交即构建"的质量闸门。
name: User Center CI

on:
  push:
    branches: [main]
    paths:
      - 'user-center/**'
  pull_request:
    paths:
      - 'user-center/**'

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-center/backend
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
      - name: Build (skip tests — 需数据库)
        run: mvn -B -q clean package -DskipTests

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-center/frontend
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      - name: Install & build
        run: |
          npm ci
          npm run build
