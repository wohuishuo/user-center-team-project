name: User Center Quality
on:
  pull_request:
    paths: ['user-center/**']
  push:
    branches: [main]
    paths: ['user-center/**']
jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: user-center
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: maven, cache-dependency-path: user-center/backend/pom.xml }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: npm, cache-dependency-path: user-center/frontend/package-lock.json }
      - run: npm ci
        working-directory: user-center/frontend
      - name: Backend tests with disposable MySQL
        shell: pwsh
        run: ./scripts/test-backend.ps1
        working-directory: user-center
      - name: Frontend lint, test and build
        run: npm run verify
        working-directory: user-center/frontend
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: user-center-test-evidence
          path: |
            user-center/backend/target/surefire-reports/
            user-center/frontend/dist/
          retention-days: 30
